services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/diogothomaz/click-hero-api:v0.0.1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - PORT=3000
    depends_on:
      redis:
        condition: service_started
    command: ["node", "dist/index.js"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 10s
      retries: 5

  worker:
    image: ghcr.io/diogothomaz/click-hero-worker:v0.0.1
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_started
    command: ["node", "dist/worker.js"]

volumes:
  redis_data:
